<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 800" preserveAspectRatio="xMidYMax slice">
<defs>
  <!-- Outfield maaistrepen (diagonaal) -->
  <pattern id="mow" width="110" height="110" patternUnits="userSpaceOnUse" patternTransform="rotate(42 660 400)">
    <rect width="55" height="110" fill="#1c5a0a"/>
    <rect x="55" width="55" height="110" fill="#2e7418"/>
  </pattern>
  <!-- Infield gras (tegenovergestelde richting = checkered effect) -->
  <pattern id="mow2" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(-48 660 480)">
    <rect width="40" height="80" fill="#1f5e0c"/>
    <rect x="40" width="40" height="80" fill="#2a6b14"/>
  </pattern>
  <!-- Gras glow (licht schijnsel over gras) -->
  <radialGradient id="fieldglow" cx="50%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#4a9e28" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0e3005" stop-opacity="0.0"/>
  </radialGradient>
</defs>

<!-- ===== OUTFIELD GRAS ===== -->
<rect width="1320" height="800" fill="url(#mow)"/>
<!-- Zachte gloed over gras -->
<rect width="1320" height="800" fill="url(#fieldglow)"/>

<!-- ===== INFIELD DIRT ===== -->
<!-- Fan-shape van home plate → bezier boog → terug -->
<path d="M 660,762 L 82,252 Q 660,-90 1238,252 Z" fill="#b07428"/>
<!-- Lichte schaduwlaag in het zand voor diepte -->
<path d="M 660,762 L 82,252 Q 660,-90 1238,252 Z" fill="rgba(0,0,0,0.12)"/>
<path d="M 660,762 L 82,252 Q 660,-90 1238,252 Z" fill="none" stroke="#8a5614" stroke-width="1" opacity="0.4"/>

<!-- ===== INFIELD GRAS DIAMOND ===== -->
<polygon points="1002,481 660,223 318,481 660,736" fill="url(#mow2)"/>

<!-- ===== PITCHER'S MOUND ===== -->
<ellipse cx="660" cy="480" rx="48" ry="48" fill="#c08230"/>
<ellipse cx="660" cy="480" rx="48" ry="48" fill="rgba(0,0,0,0.08)"/>
<ellipse cx="660" cy="480" rx="48" ry="48" fill="none" stroke="white" stroke-width="1.2" opacity="0.35"/>

<!-- ===== FOUL LINES ===== -->
<line x1="660" y1="762" x2="-20" y2="-20" stroke="white" stroke-width="3.5" opacity="0.88"/>
<line x1="660" y1="762" x2="1340" y2="-20" stroke="white" stroke-width="3.5" opacity="0.88"/>

<!-- ===== BASELINES ===== -->
<line x1="660" y1="762" x2="1002" y2="481" stroke="white" stroke-width="2.5" opacity="0.82"/>
<line x1="1002" y1="481" x2="660" y2="223" stroke="white" stroke-width="2.5" opacity="0.82"/>
<line x1="660" y1="223" x2="318" y2="481" stroke="white" stroke-width="2.5" opacity="0.82"/>
<line x1="318" y1="481" x2="660" y2="762" stroke="white" stroke-width="2.5" opacity="0.82"/>

<!-- ===== OUTER INFIELD ARC (buitengrens dirt) ===== -->
<path d="M 82,252 Q 660,-90 1238,252" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>

<!-- ===== BATTER'S BOXES ===== -->
<rect x="586" y="696" width="56" height="82" fill="none" stroke="white" stroke-width="2.5" opacity="0.88"/>
<rect x="678" y="696" width="56" height="82" fill="none" stroke="white" stroke-width="2.5" opacity="0.88"/>

<!-- ===== HOME PLATE (pentagon) ===== -->
<polygon points="660,792 643,775 643,754 677,754 677,775" fill="white"/>

<!-- ===== BASES ===== -->
<!-- 1st base -->
<rect x="990" y="469" width="24" height="24" rx="3" fill="white"/>
<!-- 2nd base -->
<rect x="648" y="211" width="24" height="24" rx="3" fill="white"/>
<!-- 3rd base -->
<rect x="306" y="469" width="24" height="24" rx="3" fill="white"/>

<!-- ===== PITCHER'S RUBBER ===== -->
<rect x="652" y="477" width="16" height="6" rx="2" fill="white" opacity="0.9"/>

<!-- ===== LICHT GLOEIEND OVERLAY OVER HEEL VELD ===== -->
<rect width="1320" height="800" fill="rgba(255,255,255,0.015)"/>
</svg>
